<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Football Stats & Prediction System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        button { padding: 10px 15px; cursor: pointer; background: #34495e; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #2c3e50; }
        .btn-other { background: #e67e22; }
        .btn-other:hover { background: #d35400; }
        .btn-clear { background: #e74c3c; }
        .btn-clear:hover { background: #c0392b; }
        .btn-save { background: #9b59b6; }
        .btn-save:hover { background: #8e44ad; }
        .btn-load { background: #3498db; }
        .btn-load:hover { background: #2980b9; }
        .btn-delete { background: #e74c3c; padding: 5px 10px; font-size: 12px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        select, input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ccc; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #2c3e50; color: white; }
        .btn-calc { background: #27ae60; width: 100%; font-size: 16px; margin-top: 10px; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-calc:hover { background: #219a52; }
        .result-row { font-weight: bold; }
        
        /* Base Colors */
        .prob-color { background: #e8f5e9; }
        .odds-color { background: #fff3e0; }
        .winrate-color { background: #e3f2fd; }
        .matchodd-color { background: #fce4ec; }
        .adjusted-color { background: #fff8e1; }
        .points-color { background: #f3e5f5; }
        .scoring-color { background: #e0f7fa; }
        .ranking-color { background: #fff3e0; }
        
        /* Conditional Color Classes */
        .home-high { background: #66bb6a !important; color: white; }
        .away-high { background: #ef5350 !important; color: white; }
        
        .hidden-row { display: none; }
        
        /* Status Badge */
        .status-badge { 
            display: inline-block; 
            padding: 5px 15px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: bold;
            margin-left: 10px;
        }
        .status-saved { background: #27ae60; color: white; }
        .status-not-saved { background: #e74c3c; color: white; }
        
        /* Saved Files List */
        .saved-files-container {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }
        .saved-files-header {
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .saved-file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid #ddd;
        }
        .saved-file-item.active {
            background: #d5f5e3;
            border-color: #27ae60;
        }
        .saved-file-info {
            display: flex;
            flex-direction: column;
        }
        .saved-file-name {
            font-weight: bold;
            color: #2c3e50;
        }
        .saved-file-meta {
            font-size: 12px;
            color: #7f8c8d;
        }
        .saved-file-actions {
            display: flex;
            gap: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="border-left: 5px solid #27ae60; padding-left: 10px;">
        ⚽ Football Stats & Prediction 
        <span id="dataStatus" class="status-badge status-not-saved">No Data</span>
    </h2>
    <div class="controls">
        <input type="file" id="csvUpload" accept=".csv" style="margin-bottom: 15px;">
        
        <!-- ✅ Saved Files Selection -->
        <div class="saved-files-container" id="savedFilesContainer" style="display: none;">
            <div class="saved-files-header">📁 Saved Files (Select to Load)</div>
            <div id="savedFilesList"></div>
        </div>
        
        <div class="btn-group" style="margin-top: 15px;">
            <button onclick="displayLeagueTable('overall', 'all')">Overall All</button>
            <button onclick="displayLeagueTable('overall', 'home')">Overall Home</button>
            <button onclick="displayLeagueTable('overall', 'away')">Overall Away</button>
            <button onclick="displayLeagueTable('last6', 'all')">Last 6 All</button>
            <button onclick="displayLeagueTable('last6', 'home')">Last 6 Home</button>
            <button onclick="displayLeagueTable('last6', 'away')">Last 6 Away</button>
        </div>
        <div class="grid">
            <select id="homeTeam"><option value="">Home Team ရွေးပါ</option></select>
            <select id="awayTeam"><option value="">Away Team ရွေးပါ</option></select>
        </div>
        <button class="btn-calc" onclick="calculatePrediction()">Calculate Prediction</button>
        <button class="btn-other" onclick="toggleOtherRows()" style="width: 100%; margin-top: 10px;">📊 Other (Show/Hide)</button>
        <div class="btn-group" style="margin-top: 15px;">
            <button class="btn-save" onclick="saveDataToStorage()" style="flex:1;">💾 Save Current Data</button>
            <button class="btn-clear" onclick="clearAllSavedData()" style="flex:1;">🗑️ Clear All Data</button>
        </div>
    </div>
    <table id="mainTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
let rawData = [];
let currentFileName = '';
let showOtherRows = false;
const STORAGE_KEY = 'football_stats_files_v2';
let savedFiles = [];

// ✅ Load Data from LocalStorage on Page Load
window.addEventListener('load', () => {
    loadSavedFilesList();
});

// ✅ Load Saved Files List from LocalStorage
function loadSavedFilesList() {
    const saved = localStorage.getItem(STORAGE_KEY);
    
    if (saved) {
        try {
            savedFiles = JSON.parse(saved);
            renderSavedFilesList();
            updateStatusBadge(false);
            
            if (savedFiles.length > 0) {
                document.getElementById('savedFilesContainer').style.display = 'block';
            }
        } catch (e) {
            console.error('❌ Error loading files list:', e);
            savedFiles = [];
        }
    } else {
        savedFiles = [];
        updateStatusBadge(false);
    }
}

// ✅ Render Saved Files List
function renderSavedFilesList() {
    const container = document.getElementById('savedFilesList');
    
    if (savedFiles.length === 0) {
        container.innerHTML = '<p style="color: #7f8c8d; text-align: center;">No saved files yet</p>';
        document.getElementById('savedFilesContainer').style.display = 'none';
        return;
    }
    
    document.getElementById('savedFilesContainer').style.display = 'block';
    
    container.innerHTML = savedFiles.map((file, index) => `
        <div class="saved-file-item ${currentFileName === file.name ? 'active' : ''}">
            <div class="saved-file-info">
                <span class="saved-file-name">📄 ${file.name}</span>
                <span class="saved-file-meta">${file.matches} matches | ${file.date}</span>
            </div>
            <div class="saved-file-actions">
                <button class="btn-load" onclick="loadFile(${index})">Load</button>
                <button class="btn-delete" onclick="deleteFile(${index})">Delete</button>
            </div>
        </div>
    `).join('');
}

// ✅ Save New File to LocalStorage
function saveDataToStorage() {
    if (rawData.length === 0) {
        alert("⚠️ သိမ်းဆည်းရန် ဒေတာမရှိပါ။ CSV file အရင်တင်ပါ။");
        return;
    }
    
    const fileName = prompt("File name သတ်မှတ်ပါ:", currentFileName || "league_data_" + new Date().toISOString().slice(0,10));
    
    if (!fileName) return;
    
    // Check if file name already exists
    const existingIndex = savedFiles.findIndex(f => f.name === fileName);
    
    if (existingIndex >= 0) {
        const overwrite = confirm(`"${fileName}" ဖိုင်ရှိပြီးသားဖြစ်သည်။ အစားထိုးသိမ်းဆည်းမလား?`);
        if (!overwrite) return;
        savedFiles.splice(existingIndex, 1);
    }
    
    const fileData = {
        name: fileName,
        data: rawData,
        matches: rawData.length,
        date: new Date().toLocaleString('my-MM')
    };
    
    try {
        savedFiles.push(fileData);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(savedFiles));
        currentFileName = fileName;
        renderSavedFilesList();
        updateStatusBadge(true);
        alert(`✅ "${fileName}" သိမ်းဆည်းပြီးပါပြီ! (${rawData.length} matches)`);
    } catch (e) {
        console.error('❌ Error saving data:', e);
        alert("❌ သိမ်းဆည်း၍မရပါ။ Storage ပြည့်နေနိုင်ပါသည်။");
        savedFiles.pop();
    }
}

// ✅ Load Specific File
function loadFile(index) {
    if (index < 0 || index >= savedFiles.length) return;
    
    const file = savedFiles[index];
    
    try {
        rawData = file.data;
        currentFileName = file.name;
        updateTeamDropdowns();
        updateStatusBadge(true);
        renderSavedFilesList();
        document.getElementById('tableBody').innerHTML = '';
        alert(`✅ "${file.name}" ဝန်ပိုးပြီးပါပြီ! (${file.matches} matches)`);
    } catch (e) {
        console.error('❌ Error loading file:', e);
        alert("❌ ဖိုင်ဝန်ပိုး၍မရပါ။");
    }
}

// ✅ Delete Specific File
function deleteFile(index) {
    if (index < 0 || index >= savedFiles.length) return;
    
    const file = savedFiles[index];
    const confirmDelete = confirm(`"${file.name}" ကို ဖျက်မည်။ သေချာပါသလား?`);
    
    if (!confirmDelete) return;
    
    savedFiles.splice(index, 1);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(savedFiles));
    
    if (currentFileName === file.name) {
        rawData = [];
        currentFileName = '';
        updateTeamDropdowns();
        updateStatusBadge(false);
        document.getElementById('tableBody').innerHTML = '';
    }
    
    renderSavedFilesList();
    alert(`✅ "${file.name}" ဖျက်ပြီးပါပြီ။`);
}

// ✅ Clear All Saved Data
function clearAllSavedData() {
    const confirmClear = confirm("သိမ်းဆည်းထားသော ဖိုင်အားလုံးကို ဖျက်မည်။ သေချာပါသလား?");
    
    if (!confirmClear) return;
    
    localStorage.removeItem(STORAGE_KEY);
    savedFiles = [];
    rawData = [];
    currentFileName = '';
    updateTeamDropdowns();
    updateStatusBadge(false);
    document.getElementById('tableBody').innerHTML = '';
    document.getElementById('savedFilesContainer').style.display = 'none';
    alert("✅ ဖိုင်အားလုံး ဖျက်ပြီးပါပြီ။");
}

// ✅ Update Status Badge
function updateStatusBadge(isSaved) {
    const badge = document.getElementById('dataStatus');
    if (isSaved && rawData.length > 0) {
        badge.textContent = `✓ ${currentFileName || 'Loaded'} (${rawData.length} matches)`;
        badge.className = 'status-badge status-saved';
    } else {
        badge.textContent = 'No Data';
        badge.className = 'status-badge status-not-saved';
    }
}

// ✅ Update Team Dropdowns
function updateTeamDropdowns() {
    if (rawData.length === 0) {
        const hS = document.getElementById('homeTeam'), aS = document.getElementById('awayTeam');
        hS.innerHTML = aS.innerHTML = '<option value="">အသင်းရွေးပါ</option>';
        return;
    }
    
    const teams = [...new Set(rawData.map(d => d.HomeTeam))].sort();
    const hS = document.getElementById('homeTeam'), aS = document.getElementById('awayTeam');
    hS.innerHTML = aS.innerHTML = '<option value="">အသင်းရွေးပါ</option>';
    teams.forEach(t => { 
        hS.add(new Option(t, t)); 
        aS.add(new Option(t, t)); 
    });
}

// CSV Parsing
document.getElementById('csvUpload').addEventListener('change', (e) => {
    const file = e.target.files[0];
    const fileName = file ? file.name : 'uploaded_file';
    
    Papa.parse(file, { 
        header: true, 
        dynamicTyping: true, 
        skipEmptyLines: true, 
        complete: (res) => {
            rawData = res.data
                .filter(d => d.HomeTeam && d.AwayTeam && d.FTR)
                .sort((a, b) => {
                    if (a.Date && b.Date) {
                        return new Date(a.Date) - new Date(b.Date);
                    }
                    return 0;
                });
            
            currentFileName = fileName;
            updateTeamDropdowns();
            updateStatusBadge(false);
            alert(`Data Loaded Successfully! (${rawData.length} matches)\n💾 သိမ်းဆည်းရန် 'Save Current Data' ခလုတ်ကို နှိပ်ပါ။`);
        }
    });
});

// League Table Display Logic
function displayLeagueTable(type, loc) {
    if (rawData.length === 0) {
        alert("⚠️ ပထမဆုံး CSV file အရင်တင်ပါ။");
        return;
    }
    
    let stats = {};
    const teams = [...new Set(rawData.map(d => d.HomeTeam))];
    
    teams.forEach(t => {
        let allMatches = rawData.filter(m => m.HomeTeam === t || m.AwayTeam === t);
        
        let matches;
        if (type === 'last6') {
            matches = allMatches.slice(-6);
            
            if (loc === 'home') {
                matches = matches.filter(m => m.HomeTeam === t);
            } else if (loc === 'away') {
                matches = matches.filter(m => m.AwayTeam === t);
            }
        } else {
            matches = allMatches;
            
            if (loc === 'home') {
                matches = matches.filter(m => m.HomeTeam === t);
            } else if (loc === 'away') {
                matches = matches.filter(m => m.AwayTeam === t);
            }
        }
        
        stats[t] = {p:0, w:0, d:0, l:0, gf:0, ga:0, pts:0};
        
        matches.forEach(m => {
            if (m.HomeTeam === t) {
                stats[t].p++; 
                stats[t].gf += (m.FTHG||0); 
                stats[t].ga += (m.FTAG||0);
                if(m.FTR === 'H') { stats[t].w++; stats[t].pts += 3; } 
                else if(m.FTR === 'D') { stats[t].d++; stats[t].pts += 1; } 
                else stats[t].l++;
            } else if (m.AwayTeam === t) {
                stats[t].p++; 
                stats[t].gf += (m.FTAG||0); 
                stats[t].ga += (m.FTHG||0);
                if(m.FTR === 'A') { stats[t].w++; stats[t].pts += 3; } 
                else if(m.FTR === 'D') { stats[t].d++; stats[t].pts += 1; } 
                else stats[t].l++;
            }
        });
    });
    
    document.getElementById('tableHead').innerHTML = "<tr><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr>";
    document.getElementById('tableBody').innerHTML = Object.keys(stats).sort((a,b) => stats[b].pts - stats[a].pts)
        .map(t => `<tr><td>${t}</td><td>${stats[t].p}</td><td>${stats[t].w}</td><td>${stats[t].d}</td><td>${stats[t].l}</td><td>${stats[t].gf}</td><td>${stats[t].ga}</td><td>${stats[t].gf - stats[t].ga}</td><td>${stats[t].pts}</td></tr>`).join('');
}

// Poisson Math
function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }
function poissonProb(k, lambda) { return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k); }
function getRawPoissonProb(hL, aL) {
    let hw = 0, dr = 0, aw = 0;
    for (let h = 0; h <= 6; h++) {
        for (let a = 0; a <= 6; a++) {
            let p = poissonProb(h, hL) * poissonProb(a, aL);
            if (h > a) hw += p;
            else if (h === a) dr += p;
            else aw += p;
        }
    }
    return { hw: hw * 100, dr: dr * 100, aw: aw * 100 };
}

// HELPER: Get team stats by location
function getTeamStatsByLocation(team, isHome) {
    let w = 0, d = 0, l = 0;
    const matches = rawData.filter(m => isHome ? m.HomeTeam === team : m.AwayTeam === team);
    matches.forEach(m => {
        if (isHome) {
            if (m.FTR === 'H') w++;
            else if (m.FTR === 'D') d++;
            else l++;
        } else {
            if (m.FTR === 'A') w++;
            else if (m.FTR === 'D') d++;
            else l++;
        }
    });
    return { w, d, l };
}

// HELPER: Calculate Win Rate + Draw Rate
function calculateWinRate(hTeam, aTeam) {
    const hHome = getTeamStatsByLocation(hTeam, true);
    const aAway = getTeamStatsByLocation(aTeam, false);
    
    const totalMatches = hHome.w + hHome.d + hHome.l + aAway.w + aAway.d + aAway.l;
    if (totalMatches === 0) return { homeWR: "0.00", drawRate: "0.00", awayWR: "0.00" };
    
    const homeNumerator = hHome.w + aAway.l;
    const homeWR = (homeNumerator / totalMatches).toFixed(2);
    
    const drawNumerator = hHome.d + aAway.d;
    const drawRate = (drawNumerator / totalMatches).toFixed(2);
    
    const awayNumerator = aAway.w + hHome.l;
    const awayWR = (awayNumerator / totalMatches).toFixed(2);
    
    return { homeWR, drawRate, awayWR };
}

// HELPER: Calculate Match Decimal Odd
function calculateMatchDecimalOdd(winRate) {
    const homeOdd = winRate.homeWR > 0 ? (0.975 / parseFloat(winRate.homeWR)).toFixed(2) : "0.00";
    const drawOdd = winRate.drawRate > 0 ? (0.975 / parseFloat(winRate.drawRate)).toFixed(2) : "0.00";
    const awayOdd = winRate.awayWR > 0 ? (0.975 / parseFloat(winRate.awayWR)).toFixed(2) : "0.00";
    
    return { homeOdd, drawOdd, awayOdd };
}

// Helper Functions for Last 6 All Matches
function getLastNAllMatches(team, n = 6) {
    return rawData.filter(m => m.HomeTeam === team || m.AwayTeam === team).slice(-n);
}
function getGoalsFromMatches(matches, team) {
    let scored = 0, conceded = 0;
    matches.forEach(m => {
        if (m.HomeTeam === team) { scored += (m.FTHG||0); conceded += (m.FTAG||0); }
        else { scored += (m.FTAG||0); conceded += (m.FTHG||0); }
    });
    return { scored, conceded };
}

// HELPER: Get Last 6 Points and Goal Difference
function getLast6PointsAndGD(team) {
    const matches = getLastNAllMatches(team, 6);
    let pts = 0, gf = 0, ga = 0;
    
    matches.forEach(m => {
        if (m.HomeTeam === team) {
            gf += (m.FTHG||0);
            ga += (m.FTAG||0);
            if (m.FTR === 'H') pts += 3;
            else if (m.FTR === 'D') pts += 1;
        } else {
            gf += (m.FTAG||0);
            ga += (m.FTHG||0);
            if (m.FTR === 'A') pts += 3;
            else if (m.FTR === 'D') pts += 1;
        }
    });
    
    const gd = gf - ga;
    return { pts, gd };
}

// HELPER: Get Color Class based on thresholds
function getColorClass(value, type, isHome) {
    const numValue = parseFloat(value);
    
    if (isHome) {
        if (type === 'overall' && numValue >= 55) return 'home-high';
        if (type === 'last6' && numValue >= 43) return 'home-high';
        if (type === 'winrate' && numValue >= 0.4) return 'home-high';
    } else {
        if (type === 'overall' && numValue >= 50) return 'away-high';
        if (type === 'last6' && numValue >= 43) return 'away-high';
        if (type === 'winrate' && numValue >= 0.33) return 'away-high';
    }
    
    return '';
}

// HELPER: Calculate Scoring Rate
function calculateScoringRate(hTeam, aTeam) {
    const hHomeMatches = rawData.filter(m => m.HomeTeam === hTeam);
    const aAwayMatches = rawData.filter(m => m.AwayTeam === aTeam);
    
    const totalMatches = hHomeMatches.length + aAwayMatches.length;
    
    if (totalMatches === 0) return "0";
    
    const hScoredMatches = hHomeMatches.filter(m => (m.FTHG||0) > 0).length;
    const aConcededMatches = aAwayMatches.filter(m => (m.FTHG||0) > 0).length;
    const homeScoreRate = (hScoredMatches + aConcededMatches) / totalMatches;
    
    const aScoredMatches = aAwayMatches.filter(m => (m.FTAG||0) > 0).length;
    const hConcededMatches = hHomeMatches.filter(m => (m.FTAG||0) > 0).length;
    const awayScoreRate = (aScoredMatches + hConcededMatches) / totalMatches;
    
    const scoringRateResult = Math.round((homeScoreRate - awayScoreRate) * 100);
    
    return scoringRateResult.toString();
}

// HELPER: Get Team Ranking from Overall All Table
function getTeamRanking(team) {
    let stats = {};
    const teams = [...new Set(rawData.map(d => d.HomeTeam))];
    
    teams.forEach(t => {
        let matches = rawData.filter(m => m.HomeTeam === t || m.AwayTeam === t);
        stats[t] = {p:0, w:0, d:0, l:0, gf:0, ga:0, pts:0};
        
        matches.forEach(m => {
            if (m.HomeTeam === t) {
                stats[t].p++; 
                stats[t].gf += (m.FTHG||0); 
                stats[t].ga += (m.FTAG||0);
                if(m.FTR === 'H') { stats[t].w++; stats[t].pts += 3; } 
                else if(m.FTR === 'D') { stats[t].d++; stats[t].pts += 1; } 
                else stats[t].l++;
            } else if (m.AwayTeam === t) {
                stats[t].p++; 
                stats[t].gf += (m.FTAG||0); 
                stats[t].ga += (m.FTHG||0);
                if(m.FTR === 'A') { stats[t].w++; stats[t].pts += 3; } 
                else if(m.FTR === 'D') { stats[t].d++; stats[t].pts += 1; } 
                else stats[t].l++;
            }
        });
    });
    
    const sortedTeams = Object.keys(stats).sort((a, b) => {
        if (stats[b].pts !== stats[a].pts) return stats[b].pts - stats[a].pts;
        return (stats[b].gf - stats[b].ga) - (stats[a].gf - stats[a].ga);
    });
    
    const rank = sortedTeams.indexOf(team) + 1;
    const total = sortedTeams.length;
    
    return { rank, total };
}

// Main Prediction Logic
function calculatePrediction() {
    const hTeam = document.getElementById('homeTeam').value, aTeam = document.getElementById('awayTeam').value;
    if (!hTeam || !aTeam) return;

    // OVERALL Logic
    const avgHG = rawData.reduce((s, m) => s + m.FTHG, 0) / rawData.length;
    const avgAG = rawData.reduce((s, m) => s + m.FTAG, 0) / rawData.length;
    const hS = rawData.filter(m => m.HomeTeam === hTeam), aS = rawData.filter(m => m.AwayTeam === aTeam);
    
    const hL_ov = (hS.reduce((s, m) => s + m.FTHG, 0) / (hS.length || 1) / avgHG) * (aS.reduce((s, m) => s + m.FTHG, 0) / (aS.length || 1) / avgHG) * avgHG;
    const aL_ov = (aS.reduce((s, m) => s + m.FTAG, 0) / (aS.length || 1) / avgAG) * (hS.reduce((s, m) => s + m.FTAG, 0) / (hS.length || 1) / avgAG) * avgAG;
    
    const ovRaw = getRawPoissonProb(hL_ov, aL_ov);
    let ovHW = Math.round(ovRaw.hw), ovDR = Math.round(ovRaw.dr);
    let ovAW = 100 - ovHW - ovDR;

    // LAST 6 Logic
    const hAllL6 = getLastNAllMatches(hTeam, 6);
    const aAllL6 = getLastNAllMatches(aTeam, 6);
    const hGoals = getGoalsFromMatches(hAllL6, hTeam);
    const aGoals = getGoalsFromMatches(aAllL6, aTeam);
    
    const hL_form = (hGoals.scored + aGoals.conceded) / 12;
    const aL_form = (aGoals.scored + hGoals.conceded) / 12;
    const formRaw = getRawPoissonProb(hL_form, aL_form);
    
    let hw6 = Math.round(formRaw.hw);
    let dr6 = Math.round(formRaw.dr);
    let aw6 = 100 - hw6 - dr6;

    // WIN RATE Calculation
    const winRate = calculateWinRate(hTeam, aTeam);
    
    // MATCH DECIMAL ODD Calculation
    const matchOdd = calculateMatchDecimalOdd(winRate);
    
    // Overall & Last 6 Decimal Odds
    const getOdds = (p) => (p > 0 ? (97.5 / p).toFixed(2) : "0.00");
    
    const overallOdd = { home: getOdds(ovHW), draw: getOdds(ovDR), away: getOdds(ovAW) };
    const last6Odd = { home: getOdds(hw6), draw: getOdds(dr6), away: getOdds(aw6) };
    
    // ADJUSTED DECIMAL Calculation
    const adjustedHome = ((parseFloat(overallOdd.home) + parseFloat(last6Odd.home) + parseFloat(matchOdd.homeOdd)) / 3).toFixed(2);
    const adjustedDraw = ((parseFloat(overallOdd.draw) + parseFloat(last6Odd.draw) + parseFloat(matchOdd.drawOdd)) / 3).toFixed(2);
    const adjustedAway = ((parseFloat(overallOdd.away) + parseFloat(last6Odd.away) + parseFloat(matchOdd.awayOdd)) / 3).toFixed(2);

    // LAST 6 POINTS/GOALS Calculation
    const hLast6 = getLast6PointsAndGD(hTeam);
    const aLast6 = getLast6PointsAndGD(aTeam);
    const hPointsGD = `${hLast6.pts}/${hLast6.gd}`;
    const aPointsGD = `${aLast6.pts}/${aLast6.gd}`;

    // SCORING RATE Calculation
    const scoringRate = calculateScoringRate(hTeam, aTeam);

    // RANKING Calculation
    const hRanking = getTeamRanking(hTeam);
    const aRanking = getTeamRanking(aTeam);
    const hRankDisplay = `${hRanking.rank}/${hRanking.total}`;
    const aRankDisplay = `${aRanking.rank}/${aRanking.total}`;

    // Get Color Classes
    const ovHWClass = getColorClass(ovHW, 'overall', true);
    const ovAWClass = getColorClass(ovAW, 'overall', false);
    const hw6Class = getColorClass(hw6, 'last6', true);
    const aw6Class = getColorClass(aw6, 'last6', false);
    const homeWRClass = getColorClass(winRate.homeWR, 'winrate', true);
    const awayWRClass = getColorClass(winRate.awayWR, 'winrate', false);

    // UI Result Updates
    document.getElementById('tableHead').innerHTML = "<tr><th>Category</th><th>Home (1)</th><th>Draw (X)</th><th>Away (2)</th></tr>";
    document.getElementById('tableBody').innerHTML = `
        <tr class="result-row prob-color">
            <td>Overall Probability %</td>
            <td class="${ovHWClass}">${ovHW}%</td>
            <td>${ovDR}%</td>
            <td class="${ovAWClass}">${ovAW}%</td>
        </tr>
        <tr class="result-row odds-color">
            <td>Overall Decimal Odds</td>
            <td>${overallOdd.home}</td>
            <td>${overallOdd.draw}</td>
            <td>${overallOdd.away}</td>
        </tr>
        <tr class="result-row prob-color" style="background:#e3f2fd;">
            <td>Last 6 Probability %</td>
            <td class="${hw6Class}">${hw6}%</td>
            <td>${dr6}%</td>
            <td class="${aw6Class}">${aw6}%</td>
        </tr>
        <tr class="result-row winrate-color">
            <td>🏆 Win/Draw Rate</td>
            <td class="${homeWRClass}">${winRate.homeWR}</td>
            <td>${winRate.drawRate}</td>
            <td class="${awayWRClass}">${winRate.awayWR}</td>
        </tr>
        <tr class="result-row points-color">
            <td>📊 Last 6 Points/Goals</td>
            <td>${hPointsGD}</td>
            <td>-</td>
            <td>${aPointsGD}</td>
        </tr>
        <tr class="result-row ranking-color">
            <td>📈 Ranking</td>
            <td>${hRankDisplay}</td>
            <td>-</td>
            <td>${aRankDisplay}</td>
        </tr>
        <tr class="result-row scoring-color">
            <td>⚽ Scoring Rate</td>
            <td colspan="3" style="text-align:center; font-size:18px;">${scoringRate}</td>
        </tr>
        <tr class="result-row adjusted-color">
            <td>⚖️ Adjusted Decimal</td>
            <td>${adjustedHome}</td>
            <td>${adjustedDraw}</td>
            <td>${adjustedAway}</td>
        </tr>
        <tr class="result-row odds-color hidden-row" id="row-last6-odd">
            <td>Last 6 Decimal Odds</td>
            <td>${last6Odd.home}</td>
            <td>${last6Odd.draw}</td>
            <td>${last6Odd.away}</td>
        </tr>
        <tr class="result-row matchodd-color hidden-row" id="row-match-odd">
            <td>💰 Match Decimal Odd</td>
            <td>${matchOdd.homeOdd}</td>
            <td>${matchOdd.drawOdd}</td>
            <td>${matchOdd.awayOdd}</td>
        </tr>
    `;
    
    showOtherRows = false;
}

// Toggle Other Rows
function toggleOtherRows() {
    showOtherRows = !showOtherRows;
    
    const rowLast6 = document.getElementById('row-last6-odd');
    const rowMatch = document.getElementById('row-match-odd');
    
    if (rowLast6 && rowMatch) {
        if (showOtherRows) {
            rowLast6.classList.remove('hidden-row');
            rowMatch.classList.remove('hidden-row');
        } else {
            rowLast6.classList.add('hidden-row');
            rowMatch.classList.add('hidden-row');
        }
    } else {
        alert("⚠️ ပထမဆုံး Calculate Prediction နှိပ်ပါ။");
    }
}
</script>
